name: Build ARIA APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download zip
        run: curl -L -o ARIA-Android-Complete-2.zip https://github.com/YOUR_USERNAME/YOUR_REPO/releases/download/v2/ARIA-Android-Complete-2.zip

      - name: Unzip
        run: unzip ARIA-Android-Complete-2.zip

      - name: Install Gradle wrapper
        working-directory: ARIA-Android
        run: gradle wrapper

      - name: Build
        working-directory: ARIA-Android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ARIA-APK
          path: ARIA-Android/app/build/outputs/apk/debug/app-debug.apk
