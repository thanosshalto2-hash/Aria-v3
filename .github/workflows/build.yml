name: Build ARIA APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download zip
        run: |
          curl -L -o ARIA-Android-Complete-2.zip \
          https://github.com/YOUR_USERNAME/YOUR_REPO/releases/download/v2/ARIA-Android-Complete-2.zip

      - name: Unzip
        run: unzip "ARIA-Android-Complete-2.zip"

      - name: Fix XML
        run: |
          cat > ARIA-Android/app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          EOF

      - name: Install Gradle wrapper
        run: |
          cd ARIA-Android
          gradle wrapper

      - name: Build
        run: |
          cd ARIA-Android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ARIA-APK
          path: ARIA-Android/app/build/outputs/apk/debug/app-debug.apk          <EditText android:id="@+id/editTextInput" android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:layout_marginHorizontal="8dp" android:hint="Type a command..." android:hintTextColor="@color/text_muted" android:textColor="@color/text_primary" android:textSize="14sp" android:background="@null" android:maxLines="4" android:imeOptions="actionSend" android:inputType="textMultiLine|textCapSentences"/>
          <ImageButton android:id="@+id/btnSend" android:layout_width="44dp" android:layout_height="44dp" android:src="@android:drawable/ic_menu_send" android:background="@drawable/bg_send_button" android:tint="@color/accent_cyan" android:contentDescription="Send"/>
          </LinearLayout>
          </androidx.cardview.widget.CardView>
          </androidx.constraintlayout.widget.ConstraintLayout>
          XMLEOF
      - name: Install Gradle wrapper
        run: cd ARIA-Android && gradle wrapper --gradle-version 8.2
      - name: Build
        run: |
          cd ARIA-Android
          chmod +x gradlew
          ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ARIA-APK
          path: "**/app-debug.apk"
